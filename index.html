<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco de Metal - Seleção</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #1a0505;
      box-shadow: 0 0 30px rgba(120, 0, 0, 0.4);
    }
  </style>
</head>
<body>
<canvas id="sel"></canvas>
<script>
const canvas = document.getElementById('sel');
const ctx = canvas.getContext('2d');
const W = 520;
const H = 560;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// selected: 0=jogo1, 1=jogo2, 2=jogo3, 3=jogo4
let selected = 0;
let timer = 0;
let keys = {};

const GAMES = [
  { label: 'ECO DE METAL',    sub: 'SURVIVAL HORROR',         path: 'parte1/index.html', diff: '★ ★ ☆ ☆ ☆', diffLabel: 'INICIANTE',  diffCol: ['#88ff88','#336633'], details: ['Floresta noturna','1 inimigo: O Cervo','Colete 4 peças','Conserte o carro'] },
  { label: 'ECO DE METAL II', sub: 'A CAÇADA',                path: 'parte2/index.html', diff: '★ ★ ★ ★ ☆', diffLabel: 'AVANÇADO',   diffCol: ['#ff8844','#663322'], details: ['2 inimigos: Cervo+Javali','Resgatar 3 crianças','Consertar geradores','Mapa maior'] },
  { label: 'ECO DE METAL III',sub: 'A ASCENSÃO DA REDE',      path: 'parte3/index.html', diff: '★ ★ ★ ★ ★', diffLabel: 'EXTREMO',    diffCol: ['#ff4488','#661133'], details: ['Destrua a Torre de Rede','Hackeie sistemas','Use EMP e Sinalizador','Cidade em colapso'] },
  { label: 'SINAL PERDIDO',   sub: 'O MISTÉRIO DE BLACKWOOD', path: 'parte4/index.html', diff: '★ ★ ★ ☆ ☆', diffLabel: 'MÉDIO',      diffCol: ['#44aaff','#114466'], details: ['Spin-off da série','Escolha Enzo ou Murilo','Antena de Blackwood','Cooperativo automático'] },
];

// Audio
let audioCtx = null;
function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function playNav() { playTone(220, 0.07, 'square', 0.05); }
function playSelect() {
  playTone(300, 0.08, 'square', 0.07);
  setTimeout(() => playTone(400, 0.08, 'square', 0.07), 70);
  setTimeout(() => playTone(520, 0.12, 'square', 0.09), 140);
}

// Input
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  unlockAudio();

  const col = selected % 2;
  const row = Math.floor(selected / 2);

  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { if (col > 0) { selected--; playNav(); } }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { if (col < 1) { selected++; playNav(); } }
  if (e.code === 'ArrowUp'    || e.code === 'KeyW') { if (row > 0) { selected -= 2; playNav(); } }
  if (e.code === 'ArrowDown'  || e.code === 'KeyS') { if (row < 1) { selected += 2; playNav(); } }

  if (e.code === 'Enter' || e.code === 'Space') {
    playSelect();
    setTimeout(() => { window.open(GAMES[selected].path, '_blank'); }, 250);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Clique no canvas
canvas.addEventListener('click', e => {
  unlockAudio();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  const cardW = 222, cardH = 230, gapX = 16, gapY = 14;
  const startX = (W - (cardW * 2 + gapX)) / 2;
  const startY = 50;

  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    const cx  = startX + col * (cardW + gapX);
    const cy  = startY + row * (cardH + gapY);
    if (mx >= cx && mx <= cx + cardW && my >= cy && my <= cy + cardH) {
      selected = i;
      playSelect();
      setTimeout(() => { window.open(GAMES[i].path, '_blank'); }, 250);
      return;
    }
  }
});

// Hover: destaca o card ao passar o mouse
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  const cardW = 222, cardH = 230, gapX = 16, gapY = 14;
  const startX = (W - (cardW * 2 + gapX)) / 2;
  const startY = 50;

  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    const cx  = startX + col * (cardW + gapX);
    const cy  = startY + row * (cardH + gapY);
    if (mx >= cx && mx <= cx + cardW && my >= cy && my <= cy + cardH) {
      if (selected !== i) { selected = i; playNav(); }
      canvas.style.cursor = 'pointer';
      return;
    }
  }
  canvas.style.cursor = 'default';
});

// ── Utilitários de desenho ──────────────────────────────────────────────────

function drawText(text, x, y, opts = {}) {
  const { size = 12, color = '#fff', shadow = true, bold = false, align = 'left' } = opts;
  ctx.font = `${bold ? 'bold ' : ''}${size}px "Courier New", monospace`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = align;
  if (shadow) { ctx.fillStyle = '#000'; ctx.fillText(text, x + 1, y + 1); }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ── Ícones ──────────────────────────────────────────────────────────────────

function drawDeerIcon(cx, cy, active, pulse) {
  const col  = active ? '#6a4a2a' : '#3a2a1a';
  const col2 = active ? '#5a3a1a' : '#2a1a0a';
  const eyeCol = active ? `rgba(${200 + pulse * 55},30,0,${0.8 + pulse * 0.2})` : '#442211';
  drawRect(cx - 9, cy + 10, 3, 14, col2);
  drawRect(cx + 6, cy + 10, 3, 14, col2);
  drawRect(cx - 5, cy + 12, 3, 12, col);
  drawRect(cx + 2, cy + 12, 3, 12, col);
  drawRect(cx - 10, cy + 2, 20, 10, col);
  drawRect(cx - 8,  cy + 3, 16,  8, col);
  drawRect(cx - 3, cy - 5,  6,  8, col);
  drawRect(cx - 6, cy - 16, 12, 12, col);
  drawRect(cx - 9, cy - 12,  4,  5, col2);
  drawRect(cx - 4, cy - 20,  2,  5, '#555');
  drawRect(cx - 7, cy - 22,  2,  4, '#666');
  drawRect(cx + 2, cy - 20,  2,  5, '#555');
  drawRect(cx + 5, cy - 22,  2,  4, '#666');
  drawRect(cx - 4, cy - 14,  3,  3, eyeCol);
  drawRect(cx + 1, cy - 14,  3,  3, eyeCol);
  if (active) {
    ctx.globalAlpha = 0.3 + pulse * 0.2;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(cx - 2.5, cy - 12.5, 5, 0, Math.PI * 2);
    ctx.arc(cx + 2.5, cy - 12.5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawBoarIcon(cx, cy, active, pulse) {
  const col  = active ? '#4a3a2a' : '#2a1a0a';
  const col2 = active ? '#3a2a1a' : '#1a0a00';
  const eyeCol = active ? `rgba(${200 + pulse * 55},${80 + pulse * 20},0,${0.8 + pulse * 0.2})` : '#442200';
  drawRect(cx - 12, cy + 8,  5, 12, col2);
  drawRect(cx +  7, cy + 8,  5, 12, col2);
  drawRect(cx -  7, cy + 10, 4, 10, col);
  drawRect(cx +  3, cy + 10, 4, 10, col);
  drawRect(cx - 14, cy - 4, 28, 16, col);
  drawRect(cx - 12, cy - 3, 24, 14, col);
  drawRect(cx - 10, cy - 14, 20, 12, col);
  drawRect(cx - 12, cy - 10,  5,  7, col2);
  drawRect(cx - 11, cy - 7,   2,  2, '#222');
  drawRect(cx - 14, cy - 8,   3,  6, active ? '#ffaa44' : '#665533');
  drawRect(cx - 13, cy - 12,  3,  6, active ? '#ffaa44' : '#665533');
  drawRect(cx - 9, cy - 18, 3, 3, col2);
  drawRect(cx + 6, cy - 18, 3, 3, col2);
  drawRect(cx - 6, cy - 12, 3, 3, eyeCol);
  drawRect(cx + 3, cy - 12, 3, 3, eyeCol);
  if (active) {
    ctx.globalAlpha = 0.25 + pulse * 0.15;
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.arc(cx - 4.5, cy - 10.5, 5, 0, Math.PI * 2);
    ctx.arc(cx + 4.5, cy - 10.5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Torre de rede (jogo 3)
function drawTowerIcon(cx, cy, active, pulse) {
  const col  = active ? '#3a5a8a' : '#1a2a3a';
  const glow = active ? `rgba(0,${120 + pulse * 80},${200 + pulse * 55},${0.7 + pulse * 0.3})` : '#223344';

  // Base
  drawRect(cx - 2, cy + 14, 4, 6, col);
  drawRect(cx - 8, cy + 18, 16, 3, col);

  // Corpo da torre
  drawRect(cx - 1, cy - 10, 2, 24, col);
  drawRect(cx - 6, cy + 4,  12, 2, col);
  drawRect(cx - 4, cy - 4, 8, 2, col);

  // Pernas diagonais
  for (let i = 0; i < 5; i++) {
    drawRect(cx - 6 + i, cy + 6 + i, 2, 2, col);
    drawRect(cx + 4 - i, cy + 6 + i, 2, 2, col);
  }

  // Antena no topo
  drawRect(cx - 1, cy - 18, 2, 8, active ? '#88ccff' : '#445566');

  // Ondas de sinal
  if (active) {
    for (let r = 1; r <= 3; r++) {
      ctx.globalAlpha = (0.5 - r * 0.1) * (0.6 + pulse * 0.4);
      ctx.strokeStyle = glow;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy - 14, r * 5, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy - 14, r * 5, Math.PI * 1.1, Math.PI * 1.9, false);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Luz piscante no topo
    ctx.globalAlpha = 0.5 + pulse * 0.5;
    ctx.fillStyle = '#00aaff';
    ctx.fillRect(cx - 1, cy - 19, 2, 2);
    ctx.globalAlpha = 1;
  }

  // Olhos eletrônicos (dois LEDs)
  drawRect(cx - 4, cy - 2, 3, 3, glow);
  drawRect(cx + 1, cy - 2, 3, 3, glow);
}

// Rádio/antena (jogo 4 — Sinal Perdido)
function drawRadioIcon(cx, cy, active, pulse) {
  const col  = active ? '#2a4a5a' : '#0a1a22';
  const col2 = active ? '#1a3040' : '#060f14';
  const ledCol = active ? `rgba(0,${180 + pulse * 75},${220 + pulse * 35},${0.8 + pulse * 0.2})` : '#112233';

  // Corpo do rádio
  drawRect(cx - 14, cy - 4, 28, 20, col);
  drawRect(cx - 12, cy - 2, 24, 16, col2);

  // Alto-falante (grades)
  for (let i = 0; i < 4; i++) {
    drawRect(cx - 10, cy + i * 3 - 1, 10, 2, col);
  }

  // Display
  drawRect(cx + 2, cy, 8, 8, active ? '#002233' : '#000a10');
  drawRect(cx + 3, cy + 1, 6, 6, active ? ledCol : '#001122');

  // Antena
  drawRect(cx + 10, cy - 4, 2, 14, col);
  drawRect(cx + 9,  cy - 12, 2, 10, active ? '#88ccdd' : '#334455');

  // Botões
  drawRect(cx - 11, cy + 14, 4, 3, col);
  drawRect(cx - 6,  cy + 14, 4, 3, col);
  drawRect(cx - 1,  cy + 14, 4, 3, col);

  // Ondas de sinal animadas
  if (active) {
    for (let r = 1; r <= 3; r++) {
      ctx.globalAlpha = (0.5 - r * 0.1) * (0.5 + pulse * 0.5);
      ctx.strokeStyle = `rgba(0,${160 + r * 20},${220},0.8)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx + 11, cy - 8, r * 4, -Math.PI * 0.6, Math.PI * 0.6);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Estática / interferência
  if (active) {
    ctx.globalAlpha = 0.15 + pulse * 0.1;
    ctx.fillStyle = '#00ccff';
    for (let i = 0; i < 6; i++) {
      const sx = cx - 9 + (i * 7 + timer * 0.3) % 20;
      ctx.fillRect(Math.floor(sx), cy + 1 + (i % 3) * 3, 1, 2);
    }
    ctx.globalAlpha = 1;
  }
}

// ── Card ────────────────────────────────────────────────────────────────────

function drawCard(x, y, w, h, isSelected, gameIndex) {
  const pulse = Math.sin(timer * 0.07) * 0.5 + 0.5;
  const g = GAMES[gameIndex];

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x + 4, y + 4, w, h);

  // Fundo
  drawRect(x, y, w, h, isSelected ? '#0e0d14' : '#08080d');

  // Borda
  const isSpin = gameIndex === 3;
  const selR = isSpin ? 0   : 180;
  const selG = isSpin ? 100 : 60;
  const selB = isSpin ? 200 : 60;
  ctx.strokeStyle = isSelected
    ? `rgba(${selR + pulse * 60},${selG + pulse * 20},${selB + pulse * 20},${0.8 + pulse * 0.2})`
    : 'rgba(50,40,70,0.5)';
  ctx.lineWidth = isSelected ? 2 : 1;
  ctx.strokeRect(x, y, w, h);

  // Brilho interno
  if (isSelected) {
    ctx.globalAlpha = 0.05 + pulse * 0.04;
    drawRect(x + 1, y + 1, w - 2, h - 2, isSpin ? '#4488ff' : '#ff4444');
    ctx.globalAlpha = 1;
  }

  const cx = x + w / 2;

  // Ícone
  if (gameIndex === 0) {
    drawDeerIcon(cx, y + 58, isSelected, pulse);
  } else if (gameIndex === 1) {
    drawDeerIcon(cx - 16, y + 55, isSelected, pulse);
    drawBoarIcon(cx + 14, y + 58, isSelected, pulse);
  } else if (gameIndex === 2) {
    drawTowerIcon(cx, y + 58, isSelected, pulse);
  } else {
    drawRadioIcon(cx, y + 58, isSelected, pulse);
  }

  // Título
  const titleCol  = isSelected ? '#ccddcc' : '#667766';
  const subCol    = isSelected ? '#aa3333' : '#662222';
  const isSpin4   = gameIndex === 3;
  drawText(g.label, cx, y + 100, { size: 10, color: isSpin4 && isSelected ? '#66ccee' : titleCol, align: 'center', bold: true });
  drawText(g.sub,   cx, y + 113, { size: 8,  color: isSpin4 && isSelected ? '#2266aa' : subCol,   align: 'center' });

  // Detalhes
  g.details.forEach((line, i) => {
    drawText('• ' + line, cx, y + 130 + i * 13, { size: 8, color: isSelected ? '#999' : '#444', align: 'center' });
  });

  // Dificuldade
  const diffColor = isSelected ? g.diffCol[0] : g.diffCol[1];
  drawText(g.diff,       cx, y + h - 52, { size: 9,  color: diffColor, align: 'center' });
  drawText(g.diffLabel,  cx, y + h - 40, { size: 8,  color: diffColor, align: 'center' });

  // Botão
  if (isSelected) {
    const btnAlpha = 0.75 + pulse * 0.25;
    ctx.globalAlpha = btnAlpha;
    drawRect(x + 14, y + h - 26, w - 28, 18, '#15121e');
    ctx.strokeStyle = isSpin ? '#2266aa' : '#aa4444';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 14, y + h - 26, w - 28, 18);
    drawText('[ ENTER ] JOGAR', cx, y + h - 17, { size: 9, color: isSpin ? '#44aaff' : '#ff8844', align: 'center', bold: true });
    ctx.globalAlpha = 1;
  } else {
    drawRect(x + 14, y + h - 26, w - 28, 18, '#0a0a0a');
    ctx.strokeStyle = '#252535';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 14, y + h - 26, w - 28, 18);
    drawText('setas p/ selecionar', cx, y + h - 17, { size: 8, color: '#333', align: 'center' });
  }
}

// ── Cenário ─────────────────────────────────────────────────────────────────

function drawTrees() {
  for (let i = 0; i < 45; i++) {
    const tx = i * 13 + Math.sin(timer * 0.005 + i * 0.5) * 2;
    const ty = H - 44 + Math.sin(i * 1.7) * 8;
    const th = 28 + Math.sin(i * 2.3) * 8;
    ctx.fillStyle = '#040804';
    ctx.fillRect(tx, ty, 3, th);
    for (let j = 0; j < 3; j++) {
      const tw = 10 - j * 3;
      ctx.fillStyle = '#030703';
      ctx.fillRect(tx - tw / 2 + 1.5, ty - j * 11, tw, 9);
    }
  }
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  for (let i = 0; i < H; i += 3) ctx.fillRect(0, i, W, 1);
  const vg = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// ── Render principal ─────────────────────────────────────────────────────────

function render() {
  // Fundo
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#020207');
  sky.addColorStop(1, '#06060f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Estrelas
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 47 + timer * 0.005) % W;
    const sy = (i * 31) % (H * 0.35);
    ctx.globalAlpha = 0.15 + Math.sin(timer * 0.03 + i) * 0.12;
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 1, 1);
  }
  ctx.globalAlpha = 1;

  // Chão
  drawRect(0, H - 50, W, 50, '#050905');
  drawTrees();

  // Título
  drawText('ECO DE METAL', W / 2, 18, { size: 18, color: '#667766', align: 'center', bold: true });
  drawText('SELECIONE A PARTE', W / 2, 36, { size: 10, color: '#774444', align: 'center' });

  // Grid 2×2
  const cardW = 222;
  const cardH = 230;
  const gapX  = 16;
  const gapY  = 14;
  const startX = (W - (cardW * 2 + gapX)) / 2;
  const startY = 50;

  for (let i = 0; i < 4; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const cx  = startX + col * (cardW + gapX);
    const cy  = startY + row * (cardH + gapY);
    drawCard(cx, cy, cardW, cardH, selected === i, i);
  }

  // Seta indicadora
  const selCol = selected % 2;
  const selRow = Math.floor(selected / 2);
  const arrowX = startX + selCol * (cardW + gapX) + cardW / 2;
  const arrowY = startY + selRow * (cardH + gapY) - 10;
  const ap = 0.7 + Math.sin(timer * 0.12) * 0.3;
  ctx.globalAlpha = ap;
  ctx.fillStyle = selected === 3 ? '#2288ff' : '#ff6644';
  ctx.beginPath();
  ctx.moveTo(arrowX - 7, arrowY - 5);
  ctx.lineTo(arrowX + 7, arrowY - 5);
  ctx.lineTo(arrowX,     arrowY + 2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Rodapé
  drawText('← → ↑ ↓  Selecionar    ENTER  Confirmar', W / 2, H - 8, { size: 8, color: '#3a3a3a', align: 'center' });

  drawScanlines();
  timer++;
}

function loop() {
  render();
  requestAnimationFrame(loop);
}

try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
loop();
</script>
</body>
</html>
