<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco de Metal - Seleção</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050d;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      user-select: none;
    }
    .header {
      text-align: center;
      padding: 0 0 20px;
    }
    .header h1 {
      font-size: clamp(18px, 4vw, 30px);
      letter-spacing: 0.3em;
      color: #556655;
      font-weight: bold;
    }
    .header p {
      font-size: clamp(9px, 1.5vw, 11px);
      letter-spacing: 0.2em;
      color: #663333;
      margin-top: 5px;
    }
    .slider-wrap {
      position: relative;
      overflow: hidden;
      padding: 16px 0 20px;
    }
    .slider-track {
      display: flex;
      gap: 18px;
      transition: transform 0.42s cubic-bezier(0.25, 0.8, 0.25, 1);
      will-change: transform;
      padding: 12px 0;
    }
    .card {
      flex: 0 0 clamp(220px, 36vw, 360px);
      height: clamp(340px, 52vh, 460px);
      border: 1px solid #1a1a2e;
      border-radius: 3px;
      background: #080810;
      position: relative;
      cursor: pointer;
      transition: transform 0.35s ease, border-color 0.35s ease, opacity 0.35s ease;
      overflow: hidden;
    }
    .card.active { border-color: #6633aa; transform: scale(1.05); z-index: 2; opacity: 1; }
    .card.side   { opacity: 0.5; transform: scale(0.91); }
    .card.far    { opacity: 0.2; transform: scale(0.84); }
    .card canvas {
      display: block;
      width: 100%;
      height: 54%;
      image-rendering: pixelated;
    }
    .card-info {
      padding: 10px 14px 12px;
      height: 46%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-title {
      font-size: clamp(10px, 1.7vw, 14px);
      letter-spacing: 0.15em;
      font-weight: bold;
    }
    .card-sub {
      font-size: clamp(7px, 1.1vw, 10px);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    .card-details { flex: 1; margin-top: 6px; }
    .card-details p {
      font-size: clamp(7px, 1vw, 9px);
      color: #333;
      letter-spacing: 0.05em;
      line-height: 1.75;
      transition: color 0.3s;
    }
    .card.active .card-details p { color: #777; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .diff-stars { font-size: clamp(8px, 1.1vw, 10px); }
    .diff-label { font-size: clamp(6px, 0.9vw, 8px); letter-spacing: 0.1em; margin-top: 1px; }
    .btn-play {
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: clamp(7px, 1vw, 9px);
      letter-spacing: 0.1em;
      font-weight: bold;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card.active .btn-play { opacity: 1; }
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 4px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #1e1e2e;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
    .dot.active { background: #7744cc; transform: scale(1.6); }
    .nav-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 36px; height: 54px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #1e1e2e;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: color 0.2s, border-color 0.2s;
      font-family: monospace;
    }
    .nav-btn:hover { color: #ccc; border-color: #444; }
    .nav-btn.left { left: 0; }
    .nav-btn.right { right: 0; }
    .footer {
      text-align: center;
      padding: 8px 0 0;
      font-size: clamp(7px, 1.1vw, 9px);
      color: #222;
      letter-spacing: 0.1em;
    }
    .scanlines {
      position: fixed; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 3px
      );
      z-index: 100;
    }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="header">
  <h1>ECO DE METAL</h1>
  <p>SELECIONE A PARTE</p>
</div>
<div class="slider-wrap">
  <button class="nav-btn left" id="btnL">&#9664;</button>
  <div class="slider-track" id="track"></div>
  <button class="nav-btn right" id="btnR">&#9654;</button>
</div>
<div class="dots" id="dots"></div>
<div class="footer">&#8592; &#8594; NAVEGAR &nbsp;|&nbsp; ENTER JOGAR &nbsp;|&nbsp; CLIQUE NO CARD</div>

<script>
const GAMES = [
  { label:'ECO DE METAL',    sub:'SURVIVAL HORROR',         path:'parte1/index.html', diff:'&#9733;&#9733;&#9734;&#9734;&#9734;', diffLabel:'INICIANTE', diffCol:'#44aa44', titleCol:'#88cc88', subCol:'#aa3333', btnCol:'#44aa44', details:['Floresta noturna','1 inimigo: O Cervo','Colete 4 peças','Conserte o carro'],           icon:'deer'     },
  { label:'ECO DE METAL II', sub:'A CAÇADA',                path:'parte2/index.html', diff:'&#9733;&#9733;&#9733;&#9733;&#9734;', diffLabel:'AVANÇADO',  diffCol:'#ff8844', titleCol:'#ffaa66', subCol:'#cc5522', btnCol:'#ff8844', details:['2 inimigos: Cervo+Javali','Resgatar 3 crianças','Consertar geradores','Mapa maior'],  icon:'deerboar' },
  { label:'ECO DE METAL III',sub:'A ASCENSÃO DA REDE',      path:'parte3/index.html', diff:'&#9733;&#9733;&#9733;&#9733;&#9733;', diffLabel:'EXTREMO',   diffCol:'#ff4488', titleCol:'#ff77aa', subCol:'#cc1155', btnCol:'#ff4488', details:['Destrua a Torre de Rede','Hackeie sistemas','Use EMP e Sinalizador','Cidade em colapso'], icon:'tower'    },
  { label:'SINAL PERDIDO',   sub:'O MISTÉRIO DE BLACKWOOD', path:'parte4/index.html', diff:'&#9733;&#9733;&#9733;&#9734;&#9734;', diffLabel:'MÉDIO',     diffCol:'#44aaff', titleCol:'#66ccee', subCol:'#2266aa', btnCol:'#44aaff', details:['Spin-off da série','Escolha Enzo ou Murilo','Antena de Blackwood','Cooperativo auto'], icon:'radio'    },
  { label:'C A E A',         sub:'PROTOCOLO DE SOBRECARGA', path:'parte5/index.html', diff:'&#9733;&#9733;&#9733;&#9734;&#9734;', diffLabel:'MÉDIO',     diffCol:'#cc88ff', titleCol:'#dd99ff', subCol:'#9933cc', btnCol:'#cc88ff', details:['Episódio Escolar','4 Geradores','Resgate 5 Amigos','Eco de Metal — Spin-off'],          icon:'gamepad'  },
];

let current = 0;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
const cards = [], canvases = [];

GAMES.forEach((g, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  const cnv = document.createElement('canvas');
  cnv.width = 380; cnv.height = 210;
  card.appendChild(cnv);
  canvases.push(cnv);

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `
    <div>
      <div class="card-title" style="color:${g.titleCol}">${g.label}</div>
      <div class="card-sub" style="color:${g.subCol}">${g.sub}</div>
    </div>
    <div class="card-details">${g.details.map(d=>`<p>· ${d}</p>`).join('')}</div>
    <div class="card-footer">
      <div>
        <div class="diff-stars" style="color:${g.diffCol}">${g.diff}</div>
        <div class="diff-label" style="color:${g.diffCol}">${g.diffLabel}</div>
      </div>
      <button class="btn-play" style="color:${g.btnCol};border-color:${g.btnCol}">[ JOGAR ]</button>
    </div>`;
  card.appendChild(info);
  track.appendChild(card);
  cards.push(card);

  card.querySelector('.btn-play').addEventListener('click', e => { e.stopPropagation(); launch(i); });
  card.addEventListener('click', () => { if (current === i) launch(i); else { current = i; updateSlider(); } });

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => { current = i; updateSlider(); });
  dotsEl.appendChild(dot);
});

function launch(i) { window.open(GAMES[i].path, '_blank'); }

function updateSlider() {
  const cw = cards[0].offsetWidth + 18;
  const cx = (window.innerWidth - cards[0].offsetWidth) / 2;
  track.style.transform = `translateX(${cx - current * cw}px)`;
  cards.forEach((c,i) => {
    const d = Math.abs(i - current);
    c.className = 'card' + (d===0?' active':d===1?' side':' far');
  });
  document.querySelectorAll('.dot').forEach((d,i) => d.className = 'dot'+(i===current?' active':''));
}

document.getElementById('btnL').addEventListener('click', () => { if(current>0){current--;updateSlider();playNav();} });
document.getElementById('btnR').addEventListener('click', () => { if(current<GAMES.length-1){current++;updateSlider();playNav();} });
document.addEventListener('keydown', e => {
  if(e.code==='ArrowLeft'||e.code==='KeyA')  { if(current>0){current--;updateSlider();playNav();} }
  if(e.code==='ArrowRight'||e.code==='KeyD') { if(current<GAMES.length-1){current++;updateSlider();playNav();} }
  if(e.code==='Enter'||e.code==='Space')     { playSelect(); setTimeout(()=>launch(current),200); }
});
let tx0=0;
track.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
track.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  if(dx<-40&&current<GAMES.length-1){current++;updateSlider();}
  if(dx> 40&&current>0){current--;updateSlider();}
});
window.addEventListener('resize', updateSlider);

// Audio
let actx=null;
function ga(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; }
function tn(f,d,v=0.05){ const a=ga();if(!a)return;try{const o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}catch(e){} }
function playNav(){ tn(200,0.07); }
function playSelect(){ tn(300,0.07);setTimeout(()=>tn(420,0.07),70);setTimeout(()=>tn(560,0.12),140); }
document.addEventListener('click',()=>ga(),{once:true});

// ── Pixel art rendering ─────────────────────────────────────────────────────
function pr(c,x,y,w,h,col){ c.fillStyle=col; c.fillRect(Math.floor(x),Math.floor(y),w,h); }

function iconDeer(ctx,cx,cy,p,t){
  const s=2.4,col='#6a4a2a',col2='#3a2a1a';
  const ey=`rgba(${200+p*55},30,0,${0.8+p*0.2})`;
  const r=(x,y,w,h,c)=>pr(ctx,cx+x*s,cy+y*s,w*s,h*s,c||col);
  r(-9,10,3,14);r(6,10,3,14);r(-5,12,3,12);r(2,12,3,12);
  r(-10,2,20,10);r(-3,-5,6,8);r(-6,-16,12,12);
  r(-9,-12,4,5,col2);r(-4,-20,2,5,'#555');r(-7,-22,2,4,'#666');
  r(2,-20,2,5,'#555');r(5,-22,2,4,'#666');
  r(-4,-14,3,3,ey);r(1,-14,3,3,ey);
  ctx.globalAlpha=0.22+p*0.15;ctx.fillStyle='#ff0000';
  ctx.beginPath();ctx.arc(cx-2.5*s,cy-12.5*s,5*s,0,Math.PI*2);
  ctx.arc(cx+2.5*s,cy-12.5*s,5*s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}
function iconBoar(ctx,cx,cy,p,t){
  const s=2.4,col='#4a3a2a',col2='#2a1a0a';
  const ey=`rgba(${200+p*55},${80+p*20},0,0.85)`;
  const r=(x,y,w,h,c)=>pr(ctx,cx+x*s,cy+y*s,w*s,h*s,c||col);
  r(-12,8,5,12,col2);r(7,8,5,12,col2);r(-7,10,4,10);r(3,10,4,10);
  r(-14,-4,28,16);r(-10,-14,20,12);r(-12,-10,5,7,col2);
  r(-14,-8,3,6,'#ffaa44');r(-13,-12,3,6,'#ffaa44');
  r(-6,-12,3,3,ey);r(3,-12,3,3,ey);
}
function iconTower(ctx,cx,cy,p,t){
  const s=2.4,col='#334433',col2='#445544';
  const led=`rgba(0,${200+p*55},0,0.9)`;
  const r=(x,y,w,h,c)=>pr(ctx,cx+x*s,cy+y*s,w*s,h*s,c||col);
  r(-4,8,8,16);r(-6,10,12,4,col2);r(-3,-10,6,18);r(-5,-2,10,4,col2);r(-5,4,10,4,col2);
  r(-2,-22,4,12);r(-1,-26,2,6,'#00cc44');
  r(-10,-16,8,2);r(2,-16,8,2);r(-14,-20,2,6,'#00cc44');r(12,-20,2,6,'#00cc44');
  r(-2,-6,2,2,led);r(1,-6,2,2,led);
  ctx.globalAlpha=0.18+p*0.14;ctx.fillStyle='#00ff44';
  ctx.beginPath();ctx.arc(cx,cy-26*s*0.45,9*s*0.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}
function iconRadio(ctx,cx,cy,p,t){
  const s=2.4,col='#334455',col2='#445566';
  const led=`rgba(0,${160+p*60},${220+p*35},0.9)`;
  const r=(x,y,w,h,c)=>pr(ctx,cx+x*s,cy+y*s,w*s,h*s,c||col);
  r(-14,-2,28,18);r(-12,0,24,14,col2);r(-10,2,12,8,'#001a2a');r(-9,3,10,6,'#002233');
  r(2,0,8,8,'#002233');r(3,1,6,6,led);r(10,-4,2,14);r(9,-12,2,10,'#88ccdd');
  r(-11,14,4,3);r(-6,14,4,3);r(-1,14,4,3);
  for(let i=1;i<=3;i++){
    ctx.globalAlpha=(0.5-i*0.1)*(0.5+p*0.5);
    ctx.strokeStyle=`rgba(0,${160+i*20},220,0.8)`;ctx.lineWidth=s*0.45;
    ctx.beginPath();ctx.arc(cx+11*s,cy-8*s,i*4*s,-Math.PI*0.6,Math.PI*0.6);ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function iconGamepad(ctx,cx,cy,p,t){
  const s=2.4,col='#552288',col2='#7733aa';
  const btn=`rgba(${180+p*75},${80+p*40},255,0.9)`;
  const btnO=`rgba(${220+p*35},${100+p*30},0,0.9)`;
  const r=(x,y,w,h,c)=>pr(ctx,cx+x*s,cy+y*s,w*s,h*s,c||col);
  r(-16,-2,32,14);r(-14,-6,28,20);r(-10,-8,20,24,col2);r(-18,0,36,10,col2);
  r(-20,8,8,10);r(12,8,8,10);r(-18,14,6,8);r(12,14,6,8);
  r(-14,-2,8,3,col2);r(-11,-5,3,9,col2);
  r(6,-5,3,3,btn);r(11,-2,3,3,btn);r(6,1,3,3,btnO);r(2,-2,3,3,btn);
  r(-2,-2,5,5,'#aa55ff');r(-6,3,3,2,'#884499');r(3,3,3,2,'#884499');
  ctx.globalAlpha=0.2+p*0.16;ctx.fillStyle='#cc44ff';
  ctx.beginPath();ctx.arc(cx,cy+2*s,17*s,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.4+p*0.28;ctx.fillStyle='#ff88ff';
  for(let i=0;i<4;i++){
    const ang=t*0.035+i*Math.PI*0.5;
    ctx.fillRect(Math.floor(cx+Math.cos(ang)*19*s),Math.floor(cy+Math.sin(ang)*17*s),s*1.4,s*1.4);
  }
  ctx.globalAlpha=1;
}

const ICONS = { deer:iconDeer, deerboar:(c,cx,cy,p,t)=>{iconDeer(c,cx-36,cy+4,p,t);iconBoar(c,cx+36,cy,p,t);}, tower:iconTower, radio:iconRadio, gamepad:iconGamepad };

let tick=0;
(function loop(){
  requestAnimationFrame(loop);
  tick++;
  const pulse=Math.sin(tick*0.07)*0.5+0.5;
  GAMES.forEach((g,i)=>{
    const cnv=canvases[i], c=cnv.getContext('2d'), W=cnv.width, H=cnv.height;
    const active=i===current;
    c.clearRect(0,0,W,H);
    const grad=c.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,active?'#0a0810':'#050508');
    grad.addColorStop(1,active?'#12091e':'#080610');
    c.fillStyle=grad; c.fillRect(0,0,W,H);
    // stars
    for(let s=0;s<28;s++){
      const sx=(s*47+tick*0.005)%W,sy=(s*31)%(H*0.85);
      c.globalAlpha=0.1+Math.sin(tick*0.03+s)*0.07;
      c.fillStyle='#fff';c.fillRect(Math.floor(sx),Math.floor(sy),1,1);
    }
    c.globalAlpha=1;
    // ground
    c.fillStyle='#040804';c.fillRect(0,H-16,W,16);
    for(let ti=0;ti<32;ti++){
      const tx=ti*14+Math.sin(tick*0.005+ti*0.5)*1.5,ty=H-16+Math.sin(ti*1.7)*3;
      c.fillStyle='#030603';c.fillRect(tx,ty,2,16);
    }
    // icon
    c.save();
    ICONS[g.icon](c, W/2, H/2+8, active?pulse:0, tick);
    c.restore();
    // color tint
    if(active){
      c.globalAlpha=0.04+pulse*0.03;c.fillStyle=g.diffCol;c.fillRect(0,0,W,H);c.globalAlpha=1;
    }
  });
})();

updateSlider();
</script>
</body>
</html>
